<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alo Rico - Menú</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #111;
  color: #fff;
}

header {
  text-align: center;
  padding: 15px;
  background: #000;
  font-size: 22px;
}

h2 {
  border-bottom: 2px solid #444;
  padding-bottom: 5px;
}

.categoria {
  padding: 15px;
}

.item {
  background: #1c1c1c;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
}

button {
  margin-top: 5px;
  padding: 8px;
  border: none;
  background: #ff9800;
  color: #000;
  font-weight: bold;
  border-radius: 5px;
}

#carrito {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  padding: 10px;
  border-top: 2px solid #444;
}

</style>
</head>

<body>

<header>
  🍔 ALO RICO - MENÚ
  <div id="mesaInfo"></div>
</header>

<div id="menu"></div>

<div id="carrito">
  <b>🛒 Pedido:</b>
  <span id="lista"></span>
  <br>
  <button onclick="enviarPedido()">Enviar por WhatsApp</button>
</div>

<script>

// 🔗 TUS JSON (ajustar si cambia algo)
const endpoints = {
  pizzas: "https://raw.githubusercontent.com/1967-ROB/precios-alorico/main/pizzas.json",
  hamburguesas: "https://raw.githubusercontent.com/1967-ROB/precios-alorico-hamb-lomito/main/hamburguesas.json",
  lomitos: "https://raw.githubusercontent.com/1967-ROB/lomitos/main/lomitos.json",
  bebidas: "https://raw.githubusercontent.com/1967-ROB/bebidas/main/bebidas.json"
};

// 🪑 Mesa desde QR
const mesa = new URLSearchParams(window.location.search).get("mesa") || "SIN MESA";
document.getElementById("mesaInfo").innerText = "Mesa: " + mesa;

// 🛒 carrito real
let carrito = [];

// 🔄 cargar menú dinámico
async function cargarMenu() {
  const contenedor = document.getElementById("menu");

  for (const categoria in endpoints) {
    try {
      const res = await fetch(endpoints[categoria]);
      const data = await res.json();

      const div = document.createElement("div");
      div.className = "categoria";

      const titulo = document.createElement("h2");
      titulo.textContent = categoria.toUpperCase();
      div.appendChild(titulo);

      data.forEach(prod => {
        const item = document.createElement("div");
        item.className = "item";

        item.innerHTML = `
          <b>${prod.nombre}</b><br>
          ${prod.precio} Gs<br>
          <button onclick="agregar('${prod.id}','${prod.nombre}')">Agregar</button>
        `;

        div.appendChild(item);
      });

      contenedor.appendChild(div);

    } catch (e) {
      console.error("Error cargando", categoria, e);
    }
  }
}

// ➕ agregar producto
function agregar(id, nombre) {
  carrito.push({id, nombre});
  renderCarrito();
}

// 🔄 actualizar carrito visual
function renderCarrito() {
  const lista = document.getElementById("lista");
  lista.innerHTML = carrito.map(p => p.nombre).join(", ");
}

// 📲 enviar pedido
function enviarPedido() {
  if (carrito.length === 0) {
    alert("Agregá productos primero");
    return;
  }

  let mensaje = `🍔 Pedido Alo Rico%0A`;
  mensaje += `🪑 Mesa: ${mesa}%0A%0A`;

  carrito.forEach(p => {
    mensaje += `- ${p.nombre}%0A`;
  });

  const telefono = "595XXXXXXXXX"; // 🔴 CAMBIAR
  window.open(`https://wa.me/${telefono}?text=${mensaje}`);
}

// 🚀 iniciar
cargarMenu();

</script>

</body>
</html>
