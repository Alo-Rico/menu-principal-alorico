<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Qué comemos hoy? | Alo Rico</title>

  <!-- CSS PRO -->
  <link rel="stylesheet" href="style-alorico.css">
</head>

<body>

<div class="app">

  <header>
    <img src="logo.png" alt="Logo Alo Rico" class="logo">
    <h1>¿Qué comemos hoy?</h1>
    <img src="Repartidor.png" alt="Repartidor" class="icono">
  </header>

  <div class="botones">

    <!-- PIZZAS -->
    <a class="boton" href="https://alo-rico.github.io/pizza/">
      <div class="contenido-boton">
        <img src="pizza.png" class="miniatura">
        <div class="texto">
          <h3>🍕 Pizzas</h3>
          <p>Ver menú completo</p>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- LOMITOS -->
    <a class="boton" href="https://alo-rico.github.io/lomitos/">
      <div class="contenido-boton">
        <img src="lomito.png" class="miniatura">
        <div class="texto">
          <h3>🥩 Lomitos</h3>
          <p>Especialidades</p>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- HAMBURGUESAS -->
    <a class="boton" href="https://alo-rico.github.io/hamburguesa/">
      <div class="contenido-boton">
        <img src="hamburguesa.png" class="miniatura">
        <div class="texto">
          <h3>🍔 Hamburguesas</h3>
          <p>Clásicas y dobles</p>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- BEBIDAS -->
    <a class="boton" href="https://alo-rico.github.io/bebidas/">
      <div class="contenido-boton">
        <img src="bebida.png" class="miniatura">
        <div class="texto">
          <h3>🥤 Bebidas</h3>
          <p>Frías y combos</p>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

  <footer>
    © Alo Rico 2026 - Desarrollado x Pucón Personalizados
  </footer>

</div>

<!-- MENSAJE PEDIDO -->
<div id="mensaje-pedido" style="display:none;">
  📦 Tienes pedidos pendientes - Ver mis pedidos
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  authDomain: "alorico-59754.firebaseapp.com",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",
  projectId: "alorico-59754",
  storageBucket: "alorico-59754.firebasestorage.app",
  messagingSenderId: "120993494626",
  appId: "1:120993494626:web:9f9cb0ad6fbfbd1abd033b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔑 ID cliente compartido
let clienteId = localStorage.getItem("clienteId");
if (!clienteId) {
  clienteId = "cliente_" + Date.now();
  localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

// 🔥 ESCUCHAR PEDIDO GLOBAL
onValue(pedidoRef, (snapshot) => {
  const data = snapshot.val();
  const mensaje = document.getElementById("mensaje-pedido");

  if (data) {
    mensaje.style.display = "block";
  } else {
    mensaje.style.display = "none";
  }
});

// 👉 IR A VER PEDIDO
document.getElementById("mensaje-pedido").onclick = () => {
  window.location.href = "https://alo-rico.github.io/lomitos/";
};

</script>

</body>
</html>
