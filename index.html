<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>¿Qué comemos hoy? | Alo Rico</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  color: white;
}

/* CONTENEDOR */
.app {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 20px;
}

.logo {
  width: 110px;
  margin-bottom: 10px;
}

h1 {
  font-size: 24px;
  margin: 5px 0;
}

.icono {
  width: 50px;
  margin-top: 5px;
}

/* BOTONES */
.botones {
  max-width: 500px;
  margin: auto;
}

/* BOTON */
.boton {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-radius: 16px;
  text-decoration: none;
  margin: 12px 0;

  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  color: #000;

  font-weight: bold;
  font-size: 16px;

  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
  transition: all 0.25s ease;
}

.boton:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 15px 28px rgba(0,0,0,0.35);
}

/* CONTENIDO INTERNO */
.contenido-boton {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* MINIATURA */
.miniatura {
  width: 65px;
  height: 65px;
  object-fit: cover;
  border-radius: 12px;
  flex-shrink: 0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* TEXTO */
.texto {
  text-align: left;
}

.texto h3 {
  margin: 0;
  font-size: 16px;
  color: #000;
}

.texto p {
  margin: 2px 0 0;
  font-size: 12px;
  color: #222;
}

/* FLECHA */
.arrow {
  color: #000;
  font-size: 20px;
}

/* FOOTER */
footer {
  margin-top: 25px;
  text-align: center;
  font-size: 12px;
  color: #666;
}

/* MENSAJE FLOTANTE */
#mensaje-pedido {
  display: none;
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #ffcc00;
  color: #000;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: bold;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  cursor: pointer;
  z-index: 9999;
  animation: parpadeo 1.5s infinite;
}

@keyframes parpadeo {
  0% { background-color: #ffcc00; }
  50% { background-color: #ff9900; }
  100% { background-color: #ffcc00; }
}

/* RESPONSIVE */
@media (max-width: 480px) {
  .miniatura {
    width: 55px;
    height: 55px;
  }

  .texto h3 {
    font-size: 14px;
  }

  .texto p {
    font-size: 11px;
  }
}
</style>
</head>

<body>

<div class="app">

<header>
  <img src="logo.png" alt="Logo Alo Rico" class="logo" />
  <h1>¿Qué comemos hoy?</h1>
  <img src="Repartidor.png" alt="Repartidor" class="icono" />
</header>

<div class="botones">

<div class="botones">

  <!-- PIZZAS -->
  <a class="boton" href="https://alo-rico.github.io/pizzas/">
    <div class="contenido-boton">
      <img src="pizza.png" class="miniatura">
      <div class="texto">
        <h3>🍕 Pizzas</h3>
        <p>Ver menú completo</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </a>

  <!-- LOMITOS -->
  <a class="boton" href="https://alo-rico.github.io/lomitos/">
    <div class="contenido-boton">
      <img src="lomito.png" class="miniatura">
      <div class="texto">
        <h3>🥩 Lomitos</h3>
        <p>Especialidades</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </a>

  <!-- HAMBURGUESAS -->
  <a class="boton" href="https://alo-rico.github.io/precios-alorico-hamb-lomito/">
    <div class="contenido-boton">
      <img src="hamburguesa.png" class="miniatura">
      <div class="texto">
        <h3>🍔 Hamburguesas</h3>
        <p>Clásicas y dobles</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </a>

  <!-- BEBIDAS -->
  <a class="boton" href="https://alo-rico.github.io/bebidas/">
    <div class="contenido-boton">
      <img src="bebida.png" class="miniatura">
      <div class="texto">
        <h3>🥤 Bebidas</h3>
        <p>Frías y combos</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </a>

</div>
<footer>
  © Alo Rico 2026 - Desarrollado x Pucón Personalizados
</footer>

</div>

<!-- 🔴 TU LÓGICA ORIGINAL (NO TOCADA) -->
<div id="mensaje-pedido">📦 Tienes pedidos pendientes - Ver mis pedidos</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const carrito = JSON.parse(localStorage.getItem("carritoPedido")) || [];
  const totalPedido = carrito.reduce((sum, p) => sum + (p.precio || 0), 0);
  const mensaje = document.getElementById("mensaje-pedido");

  if (totalPedido > 0) {
    mensaje.style.display = "block";
  }

  mensaje.addEventListener("click", () => {
    localStorage.setItem("abrirPedido", "1");
    window.location.href = "lomitos/index.html";
  });
});
</script>

</body>
</html>
