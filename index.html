<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¿Qué comemos hoy? | Alo Rico</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff8ec, #ffe0c2);
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      margin: 20px 0 10px;
    }

    header img.logo {
      width: 120px;
    }

    header h1 {
      font-size: 28px;
      color: #c24a00;
      margin: 10px 0 5px;
    }

    header img.icono {
      width: 60px;
      margin-top: 5px;
    }

    /* 🔥 PANTALLA INICIAL */
    .pantalla-inicial {
      padding: 20px;
    }

    .pantalla-inicial h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .opcion {
      width: 90%;
      max-width: 300px;
      margin: 10px auto;
      padding: 18px;
      border-radius: 15px;
      border: none;
      font-size: 16px;
      background: linear-gradient(135deg, #ff7a00, #ff4d00);
      color: white;
      box-shadow: 0 5px 12px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.2s;
    }

    .opcion:hover {
      transform: scale(1.03);
    }

    /* 🔥 MENÚ */
    .botones {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 30px;
    }

    .boton {
      background-color: #ff8c00;
      color: white;
      font-size: 20px;
      padding: 20px 40px;
      border-radius: 15px;
      text-decoration: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s, background-color 0.3s;
    }

    .boton:hover {
      transform: scale(1.05);
      background-color: #e67500;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      color: #888;
    }

    /* ✅ MENSAJE PEDIDO */
    #mensaje-pedido {
      display: none;
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffcc00;
      color: #000;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 9999;
      animation: parpadeo 1.5s infinite;
    }

    @keyframes parpadeo {
      0% { background-color: #ffcc00; }
      50% { background-color: #ff9900; }
      100% { background-color: #ffcc00; }
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>¿Qué comemos hoy?</h1>
  <img src="Repartidor.png" class="icono">
</header>

<!-- 🔥 PANTALLA INICIAL -->
<div id="pantalla-inicial" class="pantalla-inicial">
  <h2>¿Cómo querés pedir?</h2>

  <button class="opcion" onclick="seleccionar('local')">
    🍽️ Estoy en el local
  </button>

  <button class="opcion" onclick="seleccionar('calle')">
    🛍️ Quiero retirar
  </button>

  <button class="opcion" onclick="seleccionar('casa')">
    🏠 Estoy en casa
  </button>
</div>

<!-- 🔥 MENÚ ORIGINAL (NO TOCADO) -->
<div id="menu-principal" class="botones">
  <a class="boton" href="pizzas/index.html">🍕 Menú de Pizzas</a>
  <a class="boton" href="lomitos/index.html">🥩 Menú de Lomitos</a>
  <a class="boton" href="bebidas/index.html">🥤 Menú de Bebidas</a>
  <a class="boton" href="hamburguesas/index.html">🍔 Menú de Hamburguesas</a>
</div>

<footer>
  © Alo Rico 2026 - Desarrollado por Pucón Personalizados
</footer>

<div id="mensaje-pedido">📦 Tienes pedidos pendientes - Ver mis pedidos</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // 🔥 DETECCIÓN QR
  const params = new URLSearchParams(window.location.search);
  const origenQR = params.get("origen");

  if (origenQR) {
    localStorage.setItem("origen", origenQR);
  }

  const origen = localStorage.getItem("origen");

  if (origen) {
    document.getElementById("pantalla-inicial").style.display = "none";
  } else {
    document.getElementById("menu-principal").style.display = "none";
  }

  // ✅ CARRITO (NO TOCADO)
  const carrito = JSON.parse(localStorage.getItem("carritoPedido")) || [];
  const totalPedido = carrito.reduce((sum, p) => sum + (p.precio || 0), 0);
  const mensaje = document.getElementById("mensaje-pedido");

  if (totalPedido > 0) {
    mensaje.style.display = "block";
  }

  mensaje.addEventListener("click", () => {
    localStorage.setItem("abrirPedido", "1");
    window.location.href = "lomitos/index.html";
  });

});

// 🔥 SELECCIÓN MANUAL
function seleccionar(tipo) {
  localStorage.setItem("origen", tipo);

  document.getElementById("pantalla-inicial").style.display = "none";
  document.getElementById("menu-principal").style.display = "flex";
}
</script>

</body>
</html>
