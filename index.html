<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú - Alo Rico</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
}

/* CONTENEDOR */
.app {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header img {
  width: 90px;
}

.mesa {
  border: 1px solid #ff7a00;
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 12px;
}

/* ALERTA */
.alerta {
  margin-top: 15px;
  background: rgba(255,122,0,0.1);
  border: 1px solid #ff7a00;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
}

/* TITULO */
.titulo {
  margin-top: 20px;
  font-size: 20px;
}

/* CATEGORIAS */
.categorias {
  display: flex;
  gap: 10px;
  margin-top: 15px;
  overflow-x: auto;
}

.cat {
  min-width: 70px;
  text-align: center;
  padding: 10px;
  border-radius: 50px;
  background: #1a1a1a;
  font-size: 12px;
  border: 1px solid #2a2a2a;
}

.cat.active {
  border-color: #ff7a00;
  color: #ff7a00;
}

/* PRODUCTOS */
.producto {
  display: flex;
  background: #1a1a1a;
  border-radius: 14px;
  margin-top: 15px;
  padding: 10px;
  align-items: center;
}

.producto img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
}

.info {
  flex: 1;
  margin-left: 10px;
}

.info h3 {
  font-size: 14px;
}

.info p {
  font-size: 12px;
  color: #aaa;
}

.precio {
  margin-top: 5px;
  color: #ff7a00;
  font-weight: bold;
}

.add {
  background: #ff7a00;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  cursor: pointer;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  display: flex;
}

.pedido {
  flex: 1;
  background: #222;
  padding: 12px;
  text-align: center;
}

.mozo {
  flex: 1;
  background: #e53935;
  padding: 12px;
  text-align: center;
}

/* ESPACIO FINAL */
.spacer {
  height: 80px;
}
</style>

</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png">
    <div class="mesa">MESA 5</div>
  </div>

  <!-- ALERTA -->
  <div class="alerta">
    ⚡ Pedí directo desde tu mesa y evitá filas
  </div>

  <!-- TITULO -->
  <div class="titulo">NUESTRO MENÚ</div>

  <!-- CATEGORIAS -->
  <div class="categorias">
    <div class="cat">🔥</div>
    <div class="cat active">🍔</div>
    <div class="cat">🍕</div>
    <div class="cat">🥤</div>
    <div class="cat">🍰</div>
  </div>

  <!-- PRODUCTOS -->
  <div class="producto">
    <img src="burger1.jpg">
    <div class="info">
      <h3>Clásica Alo Rico</h3>
      <p>Carne, queso, lechuga, tomate</p>
      <div class="precio">Gs. 28.000</div>
    </div>
    <div class="add">+</div>
  </div>

  <div class="producto">
    <img src="burger2.jpg">
    <div class="info">
      <h3>Doble Smash</h3>
      <p>Doble carne, queso, panceta</p>
      <div class="precio">Gs. 36.000</div>
    </div>
    <div class="add">+</div>
  </div>

  <div class="producto">
    <img src="burger3.jpg">
    <div class="info">
      <h3>Pollo Crispy</h3>
      <p>Pollo crispy, lechuga, salsa</p>
      <div class="precio">Gs. 28.000</div>
    </div>
    <div class="add">+</div>
  </div>

  <div class="spacer"></div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="pedido">🛒 Ver pedido</div>
  <div class="mozo">🔔 Mozo</div>
</div>

</body>
</html>
