<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alo Rico</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR PRINCIPAL */
.app {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 30px;
}

.logo h1 {
  font-size: 28px;
  letter-spacing: 2px;
}

.logo span {
  color: #ff7a00;
  font-weight: bold;
}

/* TITULO */
.title {
  text-align: center;
  margin-bottom: 25px;
}

.title h2 {
  font-size: 22px;
  margin-bottom: 10px;
}

.title p {
  font-size: 14px;
  color: #aaa;
}

/* BOTONES */
.option {
  background: #1f1f1f;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid #2a2a2a;
}

.option:hover {
  transform: scale(1.02);
  border-color: #ff7a00;
}

/* BOTON PRINCIPAL */
.option.primary {
  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  border: none;
}

.option.primary .text p {
  color: #fff;
}

.icon {
  font-size: 26px;
}

.text h3 {
  font-size: 16px;
}

.text p {
  font-size: 12px;
  color: #bbb;
}

.arrow {
  font-size: 18px;
  color: #888;
}

/* FOOTER */
.footer {
  margin-top: 25px;
  text-align: center;
  font-size: 12px;
  color: #666;
}

/* ANIMACION */
.app {
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<div class="app">

  <div class="logo">
    <h1>🔥 <span>ALO RICO</span></h1>
  </div>

  <div class="title">
    <h2>¡Bienvenido!</h2>
    <p>¿Desde dónde querés pedir?</p>
  </div>

  <!-- OPCION 1 -->
  <div class="option primary" onclick="irMenu('local')">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="icon">🍽️</div>
      <div class="text">
        <h3>Estoy en el local</h3>
        <p>Pedir directo desde tu mesa</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

  <!-- OPCION 2 -->
  <div class="option" onclick="irMenu('retiro')">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="icon">🛍️</div>
      <div class="text">
        <h3>Quiero retirar</h3>
        <p>Pasar a buscar mi pedido</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

  <!-- OPCION 3 -->
  <div class="option" onclick="irMenu('casa')">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="icon">🏠</div>
      <div class="text">
        <h3>Estoy en casa</h3>
        <p>Quiero delivery</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </div>

  <div class="footer">
    Alo Rico © 2026
  </div>

</div>

<script>
function irMenu(tipo) {
  // luego vamos a conectar esto al menú real
  alert("Seleccionaste: " + tipo);
}
</script>

</body>
</html>
