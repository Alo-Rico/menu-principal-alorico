<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Qué comemos hoy? | Alo Rico</title>

  <!-- CSS PRO -->
  <link rel="stylesheet" href="style-alorico.css">
</head>

<body>

<div class="app">

  <header>
    <img src="logo.png" alt="Logo Alo Rico" class="logo">
    <h1>¿Qué comemos hoy?</h1>
    <img src="Repartidor.png" alt="Repartidor" class="icono">
  </header>

  <div class="botones">

    <!-- PIZZAS -->
    <a class="boton" href="https://1967-rob.github.io/precios-alo-rico/">
      <div class="contenido-boton">
        <img src="pizza.png" class="miniatura">
        <div class="texto">
          <h3>🍕 Pizzas</h3>
          <p>Ver menú completo</p>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- LOMITOS -->
    <a class="boton" href="https://alo-rico.github.io/lomitos/">
      <div class="contenido-boton">
        <img src="lomito.png" class="miniatura">
        <div class="texto">
          <h3>🥩 Lomitos</h3>
          <p>Especialidades</p>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- HAMBURGUESAS -->
    <a class="boton" href="https://alo-rico.github.io/precios-alorico-hamb-lomito/">
      <div class="contenido-boton">
        <img src="hamburguesa.png" class="miniatura">
        <div class="texto">
          <h3>🍔 Hamburguesas</h3>
          <p>Clásicas y dobles</p>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- BEBIDAS -->
    <a class="boton" href="https://alo-rico.github.io/bebidas/">
      <div class="contenido-boton">
        <img src="bebida.png" class="miniatura">
        <div class="texto">
          <h3>🥤 Bebidas</h3>
          <p>Frías y combos</p>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

  <footer>
    © Alo Rico 2026 - Desarrollado x Pucón Personalizados
  </footer>

</div>

<!-- MENSAJE PEDIDO -->
<div id="mensaje-pedido">📦 Tienes pedidos pendientes - Ver mis pedidos</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const carrito = JSON.parse(localStorage.getItem("carritoPedido")) || [];
  const totalPedido = carrito.reduce((sum, p) => sum + (p.precio || 0), 0);
  const mensaje = document.getElementById("mensaje-pedido");

  if (totalPedido > 0) {
    mensaje.style.display = "block";
  }

  mensaje.addEventListener("click", () => {
    localStorage.setItem("abrirPedido", "1");
    window.location.href = "https://alo-rico.github.io/lomitos/";
  });
});
</script>

</body>
</html>
