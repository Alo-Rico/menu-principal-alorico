<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>¿Qué comemos hoy? | Alo Rico</title>

<style>
* {
  box-sizing: border-box;
}

</head>
<body>
  <header>
    <img src="logo.png" alt="Logo Alo Rico" class="logo" />
    <h1>¿Qué comemos hoy?</h1>
    <img src="Repartidor.png" alt="Repartidor" class="icono" />
  </header>

/* CONTENEDOR */
.app {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 20px;
}

.logo {
  width: 110px;
  margin-bottom: 10px;
}

h1 {
  font-size: 24px;
  margin: 5px 0;
}

.icono {
  width: 50px;
  margin-top: 5px;
}

/* BOTONES */
.boton {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-radius: 16px;
  text-decoration: none;
  margin: 10px 0;

  /* 🔥 NUEVO ESTILO */
  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  color: #111;

  font-weight: bold;
  font-size: 16px;

  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
  transition: all 0.25s ease;
}

/* TEXTO MÁS LIMPIO */
.texto h3 {
  color: #111;
}

.texto p {
  color: #222;
  opacity: 0.7;
}

/* HOVER PRO */
.boton:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
}

/* FLECHA */
.arrow {
  color: #111;
  font-size: 20px;
}
/* DESTACADO */
.boton.primary {
  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  border: none;
}

/* TEXTO */
.texto {
  text-align: left;
}

.texto h3 {
  margin: 0;
  font-size: 16px;
}

.texto p {
  margin: 2px 0 0;
  font-size: 12px;
  color: #bbb;
}

/* ICONOS */
.icono-btn {
  font-size: 22px;
}

.arrow {
  color: #888;
}

/* FOOTER */
footer {
  margin-top: 25px;
  text-align: center;
  font-size: 12px;
  color: #666;
}

/* MENSAJE FLOTANTE (RESPETADO) */
#mensaje-pedido {
  display: none;
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #ffcc00;
  color: #000;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: bold;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  cursor: pointer;
  z-index: 9999;
  animation: parpadeo 1.5s infinite;
}

@keyframes parpadeo {
  0% { background-color: #ffcc00; }
  50% { background-color: #ff9900; }
  100% { background-color: #ffcc00; }
}
</style>
</head>

<body>

<div class="app">

<header>
  <img src="logo.png" alt="Logo Alo Rico" class="logo" />
  <h1>¿Qué comemos hoy?</h1>
  <img src="Repartidor.png" alt="Repartidor" class="icono" />
</header>

<div class="botones">

  <!-- 🔥 MANTENEMOS TUS LINKS EXACTOS -->

  <a class="boton primary" href="pizzas/index.html">
    <div class="texto">
      <h3>🍕 Pizzas</h3>
      <p>Ver menú completo</p>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="boton" href="lomitos/index.html">
    <div class="texto">
      <h3>🥩 Lomitos</h3>
      <p>Especialidades</p>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="boton" href="hamburguesas/index.html">
    <div class="texto">
      <h3>🍔 Hamburguesas</h3>
      <p>Clásicas y dobles</p>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="boton" href="bebidas/index.html">
    <div class="texto">
      <h3>🥤 Bebidas</h3>
      <p>Frías y combos</p>
    </div>
    <div class="arrow">›</div>
  </a>

</div>

<footer>
  © Alo Rico 2026 - Desarrollado x Pucón Personalizados
</footer>

</div>

<!-- 🔴 NO TOQUÉ TU LÓGICA -->
<div id="mensaje-pedido">📦 Tienes pedidos pendientes - Ver mis pedidos</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const carrito = JSON.parse(localStorage.getItem("carritoPedido")) || [];
  const totalPedido = carrito.reduce((sum, p) => sum + (p.precio || 0), 0);
  const mensaje = document.getElementById("mensaje-pedido");

  if (totalPedido > 0) {
    mensaje.style.display = "block";
  }

  mensaje.addEventListener("click", () => {
    localStorage.setItem("abrirPedido", "1");
    window.location.href = "lomitos/index.html";
  });
});
</script>

</body>
</html>
