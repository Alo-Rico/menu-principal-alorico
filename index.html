<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú - Alo Rico</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #111;
  color: #fff;
}

header {
  padding: 15px;
  text-align: center;
  background: #000;
}

h2 {
  border-bottom: 1px solid #444;
  padding-bottom: 5px;
}

.categoria {
  padding: 15px;
}

.item {
  background: #1c1c1c;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}

button {
  margin-top: 5px;
  padding: 6px 10px;
  border: none;
  background: orange;
  border-radius: 5px;
  font-weight: bold;
}

#carrito {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000;
  padding: 10px;
  border-top: 2px solid #444;
}
</style>

</head>
<body>

<header>
  <h2 id="titulo">Cargando...</h2>
</header>

<div id="menu"></div>

<div id="carrito">
  🛒 <span id="lista"></span><br>
  <button onclick="enviarPedido()">Enviar pedido</button>
</div>

<script>

// 🔎 tipo de pedido
const params = new URLSearchParams(window.location.search);
const tipo = params.get("tipo") || "general";
const mesa = params.get("mesa") || null;

// 🎯 título dinámico
let titulo = "MENÚ";
if (tipo === "mesa") titulo = "Pedido en Mesa";
if (tipo === "retiro") titulo = "Retiro en Local";
if (tipo === "delivery") titulo = "Delivery";

if (mesa) titulo += " - Mesa " + mesa;

document.getElementById("titulo").innerText = titulo;

// 🔗 endpoints reales (tus repos)
const endpoints = {
  PIZZAS: "https://raw.githubusercontent.com/1967-ROB/precios-alorico/main/pizzas.json",
  HAMBURGUESAS: "https://raw.githubusercontent.com/1967-ROB/precios-alorico-hamb-lomito/main/hamburguesas.json",
  LOMITOS: "https://raw.githubusercontent.com/1967-ROB/lomitos/main/lomitos.json",
  BEBIDAS: "https://raw.githubusercontent.com/1967-ROB/bebidas/main/bebidas.json"
};

// 🛒 carrito
let carrito = [];

// 🚀 cargar menú
async function cargarMenu() {
  const contenedor = document.getElementById("menu");

  for (const categoria in endpoints) {
    try {
      const res = await fetch(endpoints[categoria]);
      const data = await res.json();

      const div = document.createElement("div");
      div.className = "categoria";

      const titulo = document.createElement("h2");
      titulo.innerText = categoria;
      div.appendChild(titulo);

      data.forEach(prod => {
        const item = document.createElement("div");
        item.className = "item";

        item.innerHTML = `
          <b>${prod.nombre}</b><br>
          ${prod.precio} Gs<br>
          <button onclick="agregar('${prod.id}','${prod.nombre}')">Agregar</button>
        `;

        div.appendChild(item);
      });

      contenedor.appendChild(div);

    } catch (err) {
      console.error("Error cargando", categoria, err);
    }
  }
}

// ➕ agregar al carrito
function agregar(id, nombre) {
  carrito.push({ id, nombre });
  renderCarrito();
}

// 🔄 render carrito
function renderCarrito() {
  const lista = document.getElementById("lista");
  lista.innerText = carrito.map(p => p.nombre).join(", ");
}

// 📲 enviar pedido
function enviarPedido() {
  if (carrito.length === 0) {
    alert("Agregá algo al pedido");
    return;
  }

  let mensaje = `🍔 Pedido Alo Rico%0A`;
  mensaje += `Tipo: ${tipo}%0A`;

  if (mesa) mensaje += `Mesa: ${mesa}%0A`;

  mensaje += `%0A`;

  carrito.forEach(p => {
    mensaje += `- ${p.nombre}%0A`;
  });

  const telefono = "+595 971 891251"; // 🔴 CAMBIAR
  window.open(`https://wa.me/${telefono}?text=${mensaje}`);
}

// iniciar
cargarMenu();

</script>

</body>
</html>
