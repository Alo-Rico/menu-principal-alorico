<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alo Rico</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.app {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 25px;
}

.logo img {
  width: 120px;
}

/* TITULO */
.title {
  text-align: center;
  margin-bottom: 25px;
}

.title h2 {
  font-size: 22px;
  margin-bottom: 8px;
}

.title p {
  font-size: 14px;
  color: #aaa;
}

/* BOTONES */
.option {
  background: #1f1f1f;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid #2a2a2a;
  text-decoration: none;
  color: white;
}

.option:hover {
  transform: scale(1.02);
  border-color: #ff7a00;
}

.option.primary {
  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  border: none;
}

.text h3 {
  font-size: 16px;
}

.text p {
  font-size: 12px;
  color: #bbb;
}

.icon {
  font-size: 24px;
}

.arrow {
  font-size: 18px;
  color: #888;
}

/* FOOTER */
.footer {
  margin-top: 25px;
  text-align: center;
  font-size: 12px;
  color: #666;
}

/* ANIMACION */
.app {
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<div class="app">

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png" alt="Alo Rico">
  </div>

  <!-- TITULO -->
  <div class="title">
    <h2>¿Cómo querés pedir?</h2>
    <p>Elegí una opción para continuar</p>
  </div>

  <!-- OPCIONES -->

  <a class="option primary" href="mesa.html">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="icon">🪑</div>
      <div class="text">
        <h3>Estoy en el local</h3>
        <p>Pedir desde la mesa</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="option" href="menu.html">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="icon">🛍️</div>
      <div class="text">
        <h3>Quiero retirar</h3>
        <p>Pasar a buscar</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="option" href="menu.html">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="icon">🏠</div>
      <div class="text">
        <h3>Delivery</h3>
        <p>Recibir en casa</p>
      </div>
    </div>
    <div class="arrow">›</div>
  </a>

  <div class="footer">
    Alo Rico © 2026
  </div>

</div>

</body>
</html>
